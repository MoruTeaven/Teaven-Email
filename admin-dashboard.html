<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teaven Email - 管理后台</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/remixicon/4.6.0/remixicon.css">
<script src="https://cdn.bootcdn.net/ajax/libs/chart.js/4.4.8/chart.umd.min.js"></script>
<style>
:root {
  --c-orange-50: #fff7ed;
  --c-orange-100: #ffedd5;
  --c-orange-200: #fed7aa;
  --c-orange-300: #fdba74;
  --c-orange-400: #fb923c;
  --c-orange-500: #f97316;
  --c-orange-600: #ea580c;
  --c-orange-700: #c2410c;
  --c-orange-800: #9a3412;
  --c-success: #10b981;
  --c-warning: #f59e0b;
  --c-error: #ef4444;
  --c-info: #3b82f6;
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --radius-full: 9999px;
  --shadow-xs: 0 1px 2px rgba(0,0,0,.04);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 4px 6px -1px rgba(0,0,0,.06),0 2px 4px -2px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.06),0 4px 6px -4px rgba(0,0,0,.04);
  --transition: 150ms cubic-bezier(.4,0,.2,1);
}
[data-theme="light"] {
  --bg: #f8f9fb;
  --bg-surface: #fff;
  --bg-hover: #f1f3f5;
  --bg-active: #e9ecef;
  --bg-input: #f1f3f5;
  --bg-sidebar: #fff;
  --bg-topbar: rgba(255,255,255,.8);
  --bg-modal: #fff;
  --bg-tooltip: #1e293b;
  --bg-badge: #f1f3f5;
  --bg-chart: #f8f9fb;
  --border: #e5e7eb;
  --border-light: #f1f3f5;
  --text: #111827;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --text-inverse: #fff;
  --orange-bg: #fff7ed;
  --orange-border: #fed7aa;
  --success-bg: #ecfdf5;
  --success-border: #a7f3d0;
  --warning-bg: #fffbeb;
  --warning-border: #fde68a;
  --error-bg: #fef2f2;
  --error-border: #fecaca;
  --info-bg: #eff6ff;
  --info-border: #bfdbfe;
  --card-shadow: var(--shadow-sm);
  --sidebar-border: #e5e7eb;
  --topbar-blur: blur(12px);
}
[data-theme="dark"] {
  --bg: #0c0d10;
  --bg-surface: #141518;
  --bg-hover: #1c1d22;
  --bg-active: #24252b;
  --bg-input: #1c1d22;
  --bg-sidebar: #101114;
  --bg-topbar: rgba(12,13,16,.85);
  --bg-modal: #18191e;
  --bg-tooltip: #e2e8f0;
  --bg-badge: #1c1d22;
  --bg-chart: #141518;
  --border: #23242a;
  --border-light: #1c1d22;
  --text: #e5e7eb;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --text-inverse: #111827;
  --orange-bg: rgba(249,115,22,.12);
  --orange-border: rgba(249,115,22,.25);
  --success-bg: rgba(16,185,129,.12);
  --success-border: rgba(16,185,129,.25);
  --warning-bg: rgba(245,158,11,.12);
  --warning-border: rgba(245,158,11,.25);
  --error-bg: rgba(239,68,68,.12);
  --error-border: rgba(239,68,68,.25);
  --info-bg: rgba(59,130,246,.12);
  --info-border: rgba(59,130,246,.25);
  --card-shadow: 0 1px 3px rgba(0,0,0,.2),0 1px 2px rgba(0,0,0,.15);
  --sidebar-border: #1c1d22;
  --topbar-blur: blur(16px);
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
input,select,textarea,button{font-family:inherit;font-size:inherit}
a{color:var(--c-orange-500);text-decoration:none}
a:hover{color:var(--c-orange-600)}

/* Layout */
.layout{display:flex;min-height:100vh}
.sidebar{width:250px;background:var(--bg-sidebar);border-right:1px solid var(--sidebar-border);position:fixed;top:0;left:0;bottom:0;z-index:40;display:flex;flex-direction:column;transition:width var(--transition),transform var(--transition);overflow:hidden}
.sidebar.collapsed{width:68px}
.sidebar-brand{padding:18px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border-light);flex-shrink:0;white-space:nowrap}
.sidebar-brand .logo-icon{width:30px;height:30px;border-radius:var(--radius-sm);background:var(--c-orange-500);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.9rem;flex-shrink:0}
.sidebar-brand .logo-text{font-weight:700;font-size:1.1rem;color:var(--text);opacity:1;transition:opacity .15s}
.sidebar.collapsed .logo-text{opacity:0;width:0;overflow:hidden}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:2px}
.nav-section{margin-top:16px;margin-bottom:4px}
.nav-section:first-child{margin-top:0}
.nav-label{padding:8px 14px 4px;font-size:.65rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;overflow:hidden}
.sidebar.collapsed .nav-label{opacity:0;height:0;padding:0;overflow:hidden}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 13px;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:.875rem;font-weight:450;cursor:pointer;transition:all var(--transition);border:none;background:none;width:100%;text-align:left;white-space:nowrap;overflow:hidden;position:relative;text-decoration:none}
.nav-item:hover{background:var(--bg-hover);color:var(--text)}
.nav-item.active{background:var(--orange-bg);color:var(--c-orange-600);font-weight:550}
.nav-item.active::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;background:var(--c-orange-500);border-radius:0 3px 3px 0}
.nav-item i{font-size:1.15rem;width:20px;text-align:center;flex-shrink:0}
.nav-item-text{opacity:1;transition:opacity .15s}
.sidebar.collapsed .nav-item-text{opacity:0;width:0;overflow:hidden}
.nav-badge{margin-left:auto;font-size:.65rem;background:var(--c-orange-500);color:#fff;padding:1px 7px;border-radius:99px;font-weight:600}
.sidebar.collapsed .nav-badge{opacity:0}
.sidebar-footer{padding:12px 10px;border-top:1px solid var(--border-light);flex-shrink:0}
.sidebar-collapse-btn{display:flex;align-items:center;gap:11px;padding:8px 13px;border-radius:var(--radius-sm);color:var(--text-muted);font-size:.8rem;cursor:pointer;border:none;background:none;width:100%;text-align:left;white-space:nowrap;overflow:hidden;transition:all var(--transition)}
.sidebar-collapse-btn:hover{background:var(--bg-hover);color:var(--text)}
.sidebar-collapse-btn i{font-size:1.1rem;width:20px;text-align:center;flex-shrink:0;transition:transform var(--transition)}
.sidebar.collapsed .sidebar-collapse-btn i{transform:rotate(180deg)}

/* Topbar */
.topbar{position:sticky;top:0;z-index:30;background:var(--bg-topbar);backdrop-filter:var(--topbar-blur);-webkit-backdrop-filter:var(--topbar-blur);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.topbar-left{display:flex;align-items:center;gap:12px}
.mobile-menu-btn{display:none;background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;padding:4px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--text-muted)}
.breadcrumb span{color:var(--text-secondary)}
.breadcrumb i{font-size:.85rem}
.breadcrumb .current{color:var(--text);font-weight:500}
.topbar-right{display:flex;align-items:center;gap:6px}
.topbar-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:none;background:none;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.15rem;transition:all var(--transition);position:relative}
.topbar-btn:hover{background:var(--bg-hover);color:var(--text)}
.topbar-btn .dot{position:absolute;top:7px;right:7px;width:7px;height:7px;background:var(--c-error);border-radius:50%;border:2px solid var(--bg-topbar)}
.theme-btn i{font-size:1.2rem}
.user-chip{display:flex;align-items:center;gap:10px;padding:5px 12px 5px 5px;border-radius:var(--radius-full);border:1px solid var(--border);cursor:pointer;transition:all var(--transition);margin-left:4px}
.user-chip:hover{background:var(--bg-hover)}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--c-orange-400),var(--c-orange-600));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.75rem;flex-shrink:0}
.user-chip .user-name{font-size:.8rem;font-weight:500;color:var(--text)}
.user-chip .user-role{font-size:.65rem;color:var(--text-muted)}

/* Main */
.main-wrap{flex:1;margin-left:250px;transition:margin var(--transition)}
.sidebar.collapsed ~ .main-wrap{margin-left:68px}
.main-content{padding:28px 32px 48px;max-width:1440px}

/* Page header */
.page-header{margin-bottom:28px}
.page-header h2{font-size:1.45rem;font-weight:700;color:var(--text)}
.page-header p{font-size:.8rem;color:var(--text-muted);margin-top:3px}
.page-actions{display:flex;align-items:center;gap:10px}

/* Stats grid */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:28px}
.stat-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;transition:all var(--transition);position:relative;overflow:hidden}
.stat-card:hover{border-color:var(--orange-border);box-shadow:var(--shadow)}
.stat-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.stat-label{font-size:.75rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em}
.stat-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.stat-icon.orange{background:var(--orange-bg);color:var(--c-orange-500)}
.stat-icon.green{background:var(--success-bg);color:var(--c-success)}
.stat-icon.red{background:var(--error-bg);color:var(--c-error)}
.stat-icon.blue{background:var(--info-bg);color:var(--c-info)}
.stat-icon.yellow{background:var(--warning-bg);color:var(--c-warning)}
.stat-value{font-size:1.75rem;font-weight:750;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
.stat-sub{font-size:.73rem;color:var(--text-muted);margin-top:6px;display:flex;align-items:center;gap:4px}
.stat-sub.up{color:var(--c-success)}
.stat-sub.down{color:var(--c-error)}

/* Cards */
.card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border-light)}
.card-title{font-size:.9rem;font-weight:600;color:var(--text)}
.card-subtitle{font-size:.73rem;color:var(--text-muted);margin-top:2px}
.card-body{padding:22px}
.card-footer{padding:14px 22px;border-top:1px solid var(--border-light);background:var(--bg)}
.card+.card,.card+.stats-row,.stats-row+.card{margin-top:22px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:8px 16px;border-radius:var(--radius-sm);font-size:.83rem;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all var(--transition);white-space:nowrap;line-height:1.4}
.btn-primary{background:var(--c-orange-500);color:#fff;border-color:var(--c-orange-500)}
.btn-primary:hover{background:var(--c-orange-600);border-color:var(--c-orange-600)}
.btn-secondary{background:var(--bg-surface);color:var(--text);border-color:var(--border)}
.btn-secondary:hover{background:var(--bg-hover);border-color:var(--text-muted)}
.btn-ghost{background:transparent;color:var(--text-secondary);border-color:transparent}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text)}
.btn-danger{background:var(--error-bg);color:var(--c-error);border-color:var(--error-border)}
.btn-danger:hover{background:var(--c-error);color:#fff;border-color:var(--c-error)}
.btn-sm{padding:5px 11px;font-size:.77rem}
.btn-xs{padding:3px 8px;font-size:.72rem;gap:4px}
.btn-icon{width:32px;height:32px;padding:0;border-radius:var(--radius-sm)}
.btn-group{display:flex;gap:8px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:99px;font-size:.72rem;font-weight:550;white-space:nowrap}
.badge-success{background:var(--success-bg);color:var(--c-success);border:1px solid var(--success-border)}
.badge-warning{background:var(--warning-bg);color:var(--c-warning);border:1px solid var(--warning-border)}
.badge-error{background:var(--error-bg);color:var(--c-error);border:1px solid var(--error-border)}
.badge-info{background:var(--info-bg);color:var(--c-info);border:1px solid var(--info-border)}
.badge-muted{background:var(--bg-badge);color:var(--text-muted);border:1px solid var(--border)}
.badge-orange{background:var(--orange-bg);color:var(--c-orange-600);border:1px solid var(--orange-border)}
.badge-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.badge-dot.green{background:var(--c-success)}
.badge-dot.red{background:var(--c-error)}
.badge-dot.yellow{background:var(--c-warning)}

/* Tables */
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:11px 16px;text-align:left;font-size:.73rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap;cursor:pointer;user-select:none;transition:color var(--transition)}
.data-table th:hover{color:var(--text)}
.data-table th i{font-size:.75rem;margin-left:3px;opacity:.4}
.data-table th.sorted i{opacity:1;color:var(--c-orange-500)}
.data-table td{padding:12px 16px;border-bottom:1px solid var(--border-light);font-size:.83rem;vertical-align:middle}
.data-table tbody tr{transition:background var(--transition)}
.data-table tbody tr:hover{background:var(--bg-hover)}
.data-table .cell-id{font-family:"JetBrains Mono","Fira Code",monospace;font-size:.75rem;color:var(--text-muted)}
.data-table .cell-primary{font-weight:550;color:var(--text)}
.data-table .cell-secondary{font-size:.77rem;color:var(--text-muted)}
.data-table .cell-actions{display:flex;gap:4px;justify-content:flex-end}

/* Filters */
.filter-bar{display:flex;align-items:center;gap:10px;padding:14px 22px;border-bottom:1px solid var(--border-light);flex-wrap:wrap}
.filter-input{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.82rem;outline:none;min-width:220px;transition:border-color var(--transition)}
.filter-input:focus{border-color:var(--c-orange-500)}
.filter-input input{border:none;background:none;outline:none;color:var(--text);font-size:.82rem;width:100%}
.filter-input i{color:var(--text-muted);font-size:1rem;flex-shrink:0}
.filter-select{padding:7px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.82rem;outline:none;cursor:pointer;transition:border-color var(--transition)}
.filter-select:focus{border-color:var(--c-orange-500)}
.filter-grow{flex:1}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-top:1px solid var(--border-light)}
.pagination-info{font-size:.78rem;color:var(--text-muted)}
.pagination-btns{display:flex;align-items:center;gap:4px}
.page-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-surface);color:var(--text-secondary);font-size:.8rem;cursor:pointer;transition:all var(--transition)}
.page-btn:hover:not(:disabled){border-color:var(--c-orange-500);color:var(--c-orange-500)}
.page-btn.active{background:var(--c-orange-500);color:#fff;border-color:var(--c-orange-500)}
.page-btn:disabled{opacity:.35;cursor:not-allowed}

/* Forms */
.form-section+.form-section{margin-top:28px;padding-top:28px;border-top:1px solid var(--border-light)}
.form-section-title{font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 20px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:.78rem;font-weight:500;color:var(--text-secondary);display:flex;align-items:center;gap:6px}
.form-label .required{color:var(--c-error);font-size:.7rem}
.form-input,.form-select,.form-textarea{padding:9px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.83rem;outline:none;transition:border-color var(--transition);width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--c-orange-500);box-shadow:0 0 0 3px var(--orange-bg)}
.form-input.error,.form-select.error{border-color:var(--c-error)}
.form-input.error:focus{box-shadow:0 0 0 3px var(--error-bg)}
.form-textarea{resize:vertical;min-height:90px}
.form-hint{font-size:.72rem;color:var(--text-muted);margin-top:2px}
.form-error{font-size:.72rem;color:var(--c-error);margin-top:2px}
.form-select-wrapper{position:relative}
.form-select-wrapper::after{content:'\ea4e';font-family:'remixicon';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;font-size:1rem}

/* Toggle */
.toggle-wrapper{display:flex;align-items:center;gap:10px}
.toggle{position:relative;width:40px;height:22px;border-radius:99px;background:var(--border);cursor:pointer;transition:background var(--transition);flex-shrink:0}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:transform var(--transition)}
.toggle.on{background:var(--c-orange-500)}
.toggle.on::after{transform:translateX(18px)}
.toggle-label{font-size:.83rem;color:var(--text);user-select:none}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:0}
.tab-btn{padding:12px 20px;border:none;background:none;color:var(--text-muted);font-size:.83rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all var(--transition);margin-bottom:-1px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--c-orange-500);border-bottom-color:var(--c-orange-500)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-modal);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border-light)}
.modal-header h3{font-size:1.05rem;font-weight:650}
.modal-close{width:30px;height:30px;border-radius:var(--radius-sm);border:none;background:none;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.15rem;transition:all var(--transition)}
.modal-close:hover{background:var(--bg-hover);color:var(--text)}
.modal-body{padding:22px 24px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--border-light)}

/* Toast */
.toast-container{position:fixed;top:70px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg-modal);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);font-size:.83rem;animation:toastIn .3s ease;min-width:280px}
@keyframes toastIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.toast.success{border-left:3px solid var(--c-success)}
.toast.error{border-left:3px solid var(--c-error)}
.toast.warning{border-left:3px solid var(--c-warning)}
.toast i{font-size:1.1rem;flex-shrink:0}
.toast.success i{color:var(--c-success)}
.toast.error i{color:var(--c-error)}
.toast.warning i{color:var(--c-warning)}

/* Charts */
.chart-wrap{position:relative;width:100%;height:260px}
.chart-wrap.large{height:320px}
.chart-wrap canvas{width:100%!important;height:100%!important}

/* Donut */
.donut-list{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.donut-item{display:flex;align-items:center;gap:10px;font-size:.8rem}
.donut-color{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.donut-label{color:var(--text);flex:1}
.donut-value{color:var(--text-muted);font-variant-numeric:tabular-nums}
.donut-pct{color:var(--text-secondary);font-weight:550;margin-left:8px}

/* Activity List */
.activity-list{display:flex;flex-direction:column}
.activity-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border-light)}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;margin-top:2px}
.activity-icon.orange{background:var(--orange-bg);color:var(--c-orange-500)}
.activity-icon.green{background:var(--success-bg);color:var(--c-success)}
.activity-icon.red{background:var(--error-bg);color:var(--c-error)}
.activity-icon.blue{background:var(--info-bg);color:var(--c-info)}
.activity-body{flex:1;min-width:0}
.activity-title{font-size:.83rem;font-weight:500;color:var(--text)}
.activity-desc{font-size:.75rem;color:var(--text-muted);margin-top:2px}
.activity-time{font-size:.7rem;color:var(--text-muted);margin-top:4px}

/* Progress */
.progress-bar{width:100%;height:6px;background:var(--bg-input);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .4s ease}
.progress-fill.orange{background:var(--c-orange-500)}
.progress-fill.green{background:var(--c-success)}
.progress-fill.yellow{background:var(--c-warning)}

/* Avatars */
.avatars-stack{display:flex;align-items:center}
.avatars-stack .avatar{width:28px;height:28px;border-radius:50%;border:2px solid var(--bg-surface);margin-left:-8px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;color:#fff;flex-shrink:0}
.avatars-stack .avatar:first-child{margin-left:0}
.avatars-stack .more{background:var(--bg-badge);color:var(--text-muted);font-size:.6rem}

/* Grid 2-col */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}

/* Info row */
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.info-item{display:flex;flex-direction:column;gap:3px}
.info-item .info-label{font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em}
.info-item .info-value{font-size:.85rem;font-weight:500;color:var(--text)}

/* Empty State */
.empty-state{text-align:center;padding:48px 24px}
.empty-state .empty-icon{width:56px;height:56px;margin:0 auto 16px;background:var(--bg-input);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--text-muted)}
.empty-state h4{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-state p{font-size:.78rem;color:var(--text-muted);max-width:320px;margin:0 auto 16px}

/* Mobile drawer */
.mobile-drawer{display:none;position:fixed;inset:0;z-index:50;pointer-events:none}
.mobile-drawer.open{pointer-events:auto}
.mobile-drawer-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.4);opacity:0;transition:opacity .2s}
.mobile-drawer.open .mobile-drawer-backdrop{opacity:1}
.mobile-drawer-content{position:absolute;top:0;left:0;bottom:0;width:270px;background:var(--bg-sidebar);transform:translateX(-100%);transition:transform .2s ease;overflow-y:auto}
.mobile-drawer.open .mobile-drawer-content{transform:translateX(0)}

/* Settings page nav */
.settings-nav{display:flex;flex-direction:column;gap:1px;min-width:180px}
.settings-nav-item{padding:10px 14px;border-radius:var(--radius-sm);font-size:.82rem;color:var(--text-secondary);cursor:pointer;transition:all var(--transition);border:none;background:none;text-align:left}
.settings-nav-item:hover{background:var(--bg-hover);color:var(--text)}
.settings-nav-item.active{background:var(--orange-bg);color:var(--c-orange-600);font-weight:550}
.settings-content{flex:1}

/* Responsive */
@media(max-width:1024px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .grid-2{grid-template-columns:1fr}
  .grid-3{grid-template-columns:repeat(2,1fr)}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main-wrap{margin-left:0!important}
  .mobile-menu-btn{display:flex}
  .sidebar-collapse-btn{display:none}
  .mobile-drawer{display:block}
  .sidebar .nav-label{opacity:1;height:auto;padding:8px 14px 4px}
  .sidebar .nav-item-text{opacity:1;width:auto}
  .sidebar .nav-badge{opacity:1}
  .sidebar .logo-text{opacity:1;width:auto}
}
@media(max-width:640px){
  .stats-row{grid-template-columns:1fr}
  .grid-3{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .main-content{padding:16px}
  .topbar{padding:0 12px}
  .filter-bar{flex-direction:column;align-items:stretch}
  .filter-input{min-width:0}
  .user-chip .user-name,.user-chip .user-role{display:none}
  .btn-group{flex-wrap:wrap}
  .data-table{display:block;overflow-x:auto}
}

/* Print & reduced motion */
@media(prefers-reduced-motion:reduce){*,::before,::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>

/* ========== THEME ========== */
function initTheme() {
  const saved = localStorage.getItem('teaven-theme');
  if (saved) { document.documentElement.setAttribute('data-theme', saved); }
  else { const prefersDark = window.matchMedia('(prefers-color-scheme:dark)').matches; document.documentElement.setAttribute('data-theme', prefersDark?'dark':'light'); }
  updateThemeIcon();
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('teaven-theme', next);
  updateThemeIcon();
  if (window.currentChart) { window.currentChart.destroy(); renderCharts(); }
}
function updateThemeIcon() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  document.getElementById('themeIconSun').style.display = isLight ? 'none' : '';
  document.getElementById('themeIconMoon').style.display = isLight ? '' : 'none';
}

/* ========== SIDEBAR ========== */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
  localStorage.setItem('teaven-sidebar', document.getElementById('sidebar').classList.contains('collapsed') ? 'collapsed' : '');
}
function initSidebar() {
  if (localStorage.getItem('teaven-sidebar') === 'collapsed') document.getElementById('sidebar').classList.add('collapsed');
}
function toggleMobileDrawer() {
  const d = document.getElementById('mobileDrawer');
  d.classList.toggle('open');
  if (d.classList.contains('open')) { copySidebarToDrawer(); }
}
function closeMobileDrawer() { document.getElementById('mobileDrawer').classList.remove('open'); }
function copySidebarToDrawer() {
  document.getElementById('mobileDrawerContent').innerHTML = document.querySelector('.sidebar-nav').outerHTML + document.querySelector('.sidebar-footer').outerHTML;
  document.querySelectorAll('#mobileDrawerContent .nav-item').forEach(function(item) {
    item.addEventListener('click', function() { closeMobileDrawer(); });
  });
}

/* ========== NAVIGATION ========== */
function navigate(page) {
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  document.querySelector('[data-page="'+page+'"]').classList.add('active');
  const bc = document.getElementById('breadcrumb');
  const pages = { dashboard:'仪表盘', users:'用户管理', templates:'模板管理', api:'API 密钥', providers:'发送通道', logs:'发送日志', settings:'系统设置' };
  bc.innerHTML = '<span>Teaven</span><i class="ri-arrow-right-s-line"></i><span class="current">'+pages[page]+'</span>';
  if (window.currentChart) { window.currentChart.destroy(); window.currentChart = null; }
  renderPage(page);
  closeMobileDrawer();
}

/* ========== TOAST ========== */
function toast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const icons = { success:'ri-checkbox-circle-fill', error:'ri-close-circle-fill', warning:'ri-error-warning-fill' };
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = '<i class="'+icons[type]+'"></i>' + msg;
  c.appendChild(el);
  setTimeout(function() { el.style.opacity = '0'; el.style.transform = 'translateX(30px)'; setTimeout(function() { el.remove(); }, 300); }, 3000);
}

/* ========== MODAL ========== */
function showModal(title, content, footer) {
  const container = document.getElementById('modalContainer');
  container.innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><h3>'+title+'</h3><button class="modal-close" onclick="closeModal()"><i class="ri-close-line"></i></button></div><div class="modal-body">'+content+'</div>'+(footer?'<div class="modal-footer">'+footer+'</div>':'')+'</div></div>';
  document.body.style.overflow = 'hidden';
}
function closeModal() { document.getElementById('modalContainer').innerHTML = ''; document.body.style.overflow = ''; }

/* ========== UTILS ========== */
function esc(s) { return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }
function statusBadge(status) {
  const map = { active:'success', sent:'success', delivered:'success', enabled:'success', disabled:'error', failed:'error', bounced:'warning', pending:'warning', draft:'muted' };
  const labels = { active:'启用', sent:'已发送', delivered:'已送达', enabled:'已启用', disabled:'已禁用', failed:'失败', bounced:'退信', pending:'待处理', draft:'草稿' };
  const cls = map[status] || 'muted';
  return '<span class="badge badge-'+cls+'"><span class="badge-dot '+cls+'"></span>'+esc(labels[status]||status)+'</span>';
}

function filterTable(tableId, query) {
  var rows = document.querySelectorAll('#'+tableId+' tbody tr');
  rows.forEach(function(r) { r.style.display = r.textContent.toLowerCase().includes(query.toLowerCase()) ? '' : 'none'; });
}
function filterByStatus(tableId, status) {
  var rows = document.querySelectorAll('#'+tableId+' tbody tr');
  rows.forEach(function(r) {
    if (status === 'all') { r.style.display = ''; return; }
    r.style.display = r.textContent.toLowerCase().includes(status.toLowerCase()) ? '' : 'none';
  });
}
var sortDirection = {};
function sortTable(tableId, colIdx) {
  var tbody = document.querySelector('#'+tableId+' tbody');
  var rows = Array.from(tbody.querySelectorAll('tr'));
  var key = tableId+'_'+colIdx;
  sortDirection[key] = !sortDirection[key];
  rows.sort(function(a,b) {
    var va = a.cells[colIdx].textContent.trim();
    var vb = b.cells[colIdx].textContent.trim();
    var na = parseFloat(va), nb = parseFloat(vb);
    if (!isNaN(na) && !isNaN(nb)) return sortDirection[key] ? na-nb : nb-na;
    return sortDirection[key] ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  rows.forEach(function(r) { tbody.appendChild(r); });
}
