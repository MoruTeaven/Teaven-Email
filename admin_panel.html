<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teaven Email - 管理后台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23f97316'/><text x='16' y='23' text-anchor='middle' font-size='20' font-weight='bold' fill='white'>T</text></svg>">
<link rel="stylesheet" href="unified-admin-styles.css">
<style>
/* Page-specific styles not covered by unified stylesheet */
:root {
  --font-mono:"JetBrains Mono","Fira Code","Cascadia Code",Consolas,monospace;
}

/* Sidebar collapsed state adjustments */
.sidebar.collapsed .nav-text,.sidebar.collapsed .nav-arrow,.sidebar.collapsed .logo-sub,.sidebar.collapsed .logo-text,.sidebar.collapsed .sidebar-footer-copy,.sidebar.collapsed .user-detail,.sidebar.collapsed .sidebar-section-title{display:none}
.sidebar.collapsed .nav-item{justify-content:center;padding:14px}
.sidebar.collapsed .nav-icon{margin:0}
.sidebar.collapsed .sidebar-header{padding:24px 16px;text-align:center}
.sidebar.collapsed .logo{font-size:1.5rem}

/* Logo specific styling */
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--orange-500),var(--orange-600));border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:1.1rem;flex-shrink:0}
.logo-text{font-size:1.25rem;font-weight:700;letter-spacing:-.02em;color:var(--text-primary)}
.logo-sub{font-size:.65rem;font-weight:600;color:var(--primary);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}

/* Sidebar collapse button */
.sidebar-collapse-btn{width:28px;height:28px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition-fast);flex-shrink:0;font-size:.85rem}
.sidebar-collapse-btn:hover{color:var(--primary);border-color:var(--primary)}

/* User info in sidebar */
.user-info{display:flex;align-items:center;gap:12px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--orange-400),var(--orange-600));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#fff;flex-shrink:0}
.user-name{font-size:.85rem;font-weight:600;color:var(--text-primary)}
.user-email{font-size:.7rem;color:var(--text-muted)}
.admin-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.25);border-radius:100px;font-size:.65rem;font-weight:600;color:var(--primary);text-transform:uppercase;letter-spacing:.04em}

/* Top header specific */
.top-header{position:sticky;top:0;z-index:50;background:var(--bg-elevated);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.breadcrumb-sep{color:var(--text-muted);font-size:.7rem}
.header-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition-fast);position:relative}
.header-btn:hover{color:var(--primary);border-color:var(--primary)}
.header-btn svg{width:18px;height:18px}

/* Main content area */
.main{flex:1;margin-left:260px;transition:margin-left .3s var(--ease-out)}
.main.expanded{margin-left:72px}
.main-inner{padding:32px;max-width:1400px}

/* Mobile toggle */
.mobile-toggle{display:none;width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-overlay{display:none;position:fixed;inset:0;background:var(--overlay);z-index:99;opacity:0;transition:opacity .3s var(--ease-out);pointer-events:none}
.sidebar-overlay.active{opacity:1;pointer-events:auto}

/* Stat card specific styling */
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.purple::after{background:linear-gradient(90deg,var(--primary),transparent)}
.stat-card.green::after{background:linear-gradient(90deg,var(--success),transparent)}
.stat-card.blue::after{background:linear-gradient(90deg,var(--info),transparent)}
.stat-card.amber::after{background:linear-gradient(90deg,var(--warning),transparent)}
.stat-card.red::after{background:linear-gradient(90deg,var(--danger),transparent)}
.stat-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.stat-icon-box{width:42px;height:42px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center}
.stat-icon-box.orange{background:rgba(249,115,22,.12);color:var(--primary)}
.stat-icon-box.green{background:rgba(5,150,105,.12);color:var(--success)}
.stat-icon-box.blue{background:rgba(37,99,235,.12);color:var(--info)}
.stat-icon-box.amber{background:rgba(217,119,6,.12);color:var(--warning)}
.stat-icon-box.red{background:rgba(220,38,38,.12);color:var(--danger)}
.stat-icon-box svg{width:20px;height:20px}
.stat-change{font-size:.72rem;font-weight:600;padding:3px 8px;border-radius:100px;display:inline-flex;align-items:center;gap:3px}
.stat-change.up{background:rgba(5,150,105,.1);color:var(--success)}
.stat-change.down{background:rgba(220,38,38,.1);color:var(--danger)}

/* Card body and footer */
.card-body{padding:24px}
.card-footer{padding:16px 24px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px}

/* Button specific styles */
.btn svg{width:15px;height:15px}
.btn-primary{box-shadow:0 2px 8px rgba(249,115,22,.25)}
.btn-primary:hover{box-shadow:0 4px 12px rgba(249,115,22,.35);transform:translateY(-1px)}
.btn-sm svg{width:13px;height:13px}

/* Form specific styles */
.form-textarea{min-height:120px;resize:vertical;font-family:var(--font-mono);font-size:.8rem}
.form-error{font-size:.72rem;color:var(--danger);margin-top:4px;display:none}
.form-group.error .form-input,.form-group.error .form-select{border-color:var(--danger)}
.form-group.error .form-error{display:block}

/* Badge specific styles */
.badge-success{background:rgba(5,150,105,.1);color:var(--success);border:1px solid rgba(5,150,105,.2)}
.badge-warning{background:rgba(217,119,6,.1);color:var(--warning);border:1px solid rgba(217,119,6,.2)}
.badge-danger{background:rgba(220,38,38,.1);color:var(--danger);border:1px solid rgba(220,38,38,.2)}
.badge-info{background:rgba(37,99,235,.1);color:var(--info);border:1px solid rgba(37,99,235,.2)}
.badge-muted{background:var(--bg-card-hover);color:var(--text-muted);border:1px solid var(--border)}
.badge-primary{background:rgba(249,115,22,.1);color:var(--primary);border:1px solid rgba(249,115,22,.2)}

/* Table specific styles */
.table th{cursor:pointer;user-select:none}
.table th .sort-icon{margin-left:4px;font-size:.6rem;opacity:.4}
.table th.sorted .sort-icon{opacity:1;color:var(--primary)}
.table-checkbox{width:16px;height:16px;accent-color:var(--primary);cursor:pointer}

/* Toast container */
.toast-container{position:fixed;top:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:var(--radius-md);color:#fff;font-size:.82rem;font-weight:500;box-shadow:var(--shadow-lg);animation:toastIn .35s var(--ease-out);display:flex;align-items:center;gap:8px;min-width:280px}
.toast-success{background:#059669}
.toast-error{background:#dc2626}
.toast-warning{background:#d97706}
.toast-info{background:#2563eb}
.toast svg{width:16px;height:16px;flex-shrink:0}

/* Modal specific styles */
.modal-lg{max-width:720px}
.modal-header{padding:24px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-close{width:28px;height:28px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition-fast)}
.modal-close:hover{color:var(--danger);border-color:var(--danger)}
.modal-body{padding:28px}

/* Chart specific styles */
.simple-chart{display:flex;align-items:flex-end;gap:8px;height:160px;padding-top:24px}
.chart-bar{flex:1;border-radius:4px 4px 0 0;transition:all var(--transition-fast);position:relative;min-width:16px;cursor:pointer}
.chart-bar:hover{opacity:.8;filter:brightness(1.1)}
.chart-bar.orange{background:linear-gradient(to top,var(--primary),rgba(249,115,22,.3))}
.chart-bar.green{background:linear-gradient(to top,var(--success),rgba(5,150,105,.3))}
.chart-bar.blue{background:linear-gradient(to top,var(--info),rgba(37,99,235,.3))}
.chart-label{text-align:center;font-size:.65rem;color:var(--text-muted);margin-top:8px}
.chart-value{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:.65rem;font-weight:600;color:var(--text-secondary);white-space:nowrap}

/* Donut chart */
.donut-wrap{display:flex;align-items:center;gap:32px;padding:16px}
.donut-svg{flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:12px}
.donut-legend-item{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--text-secondary)}
.donut-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.donut-legend-value{font-weight:700;color:var(--text-primary);margin-left:auto}

/* Code block */
.code-block{background:var(--bg-base);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;font-family:var(--font-mono);font-size:.78rem;overflow-x:auto;white-space:pre-wrap;word-break:break-all;color:var(--text-secondary)}
.key-highlight{background:rgba(249,115,22,.15);color:var(--primary);padding:2px 8px;border-radius:3px;font-weight:600}

/* Impersonation banner */
.imp-banner{position:fixed;top:0;left:260px;right:0;z-index:60;background:rgba(249,115,22,.1);border-bottom:1px solid rgba(249,115,22,.2);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(8px);font-size:.78rem;color:var(--primary);transition:left .3s var(--ease-out)}
.imp-banner.hidden{display:none}
.main.expanded .imp-banner{left:72px}
.imp-banner-btn{padding:4px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);cursor:pointer;font-size:.72rem;font-weight:500;transition:all var(--transition-fast);text-decoration:none}
.imp-banner-btn:hover{border-color:var(--primary)}

/* Responsive adjustments */
@media (max-width:768px){
  .sidebar{transform:translateX(-100%);width:260px}
  .sidebar.mobile-open{transform:translateX(0)}
  .sidebar.collapsed{width:260px}
  .sidebar-overlay{display:block}
  .main{margin-left:0!important}
  .main-inner{padding:20px 16px}
  .top-header{padding:0 16px}
  .mobile-toggle{display:flex}
  .toolbar-left{flex-direction:column;align-items:stretch}
  .imp-banner{left:0!important}
}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-wrap">
        <div class="logo-icon">T</div>
        <div>
          <div class="logo-text">Teaven</div>
          <div class="logo-sub">Admin Panel</div>
        </div>
      </div>
      <button class="sidebar-collapse-btn" onclick="toggleSidebar()" title="折叠侧边栏">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m11 17-5-5 5-5"/><path d="m18 17-5-5 5-5"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-title">概览</div>
      <button class="nav-item active" data-page="dashboard" onclick="navigateTo('dashboard',this)">

        <span class="nav-text">仪表盘</span>
      </button>

      <div class="sidebar-section-title" style="margin-top:8px">管理</div>
      <button class="nav-item" data-page="users" onclick="navigateTo('users',this)">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
        <span class="nav-text">用户管理</span>

      <div class="sidebar-section-title" style="margin-top:8px">监控</div>
      <button class="nav-item" data-page="logs" onclick="navigateTo('logs',this)">

        <span class="nav-text">发送日志</span>
      </button>
      <button class="nav-item" data-page="analytics" onclick="navigateTo('analytics',this)">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg></span>

  <!-- Main Content -->

    <!-- Top Header -->
    <header class="top-header">
      <div style="display:flex;align-items:center;gap:12px">

<!-- Toast Container -->

<!-- Modal Container -->

<script>
/* ==================== Core ==================== */
const API_BASE = '/v1';
const API_KEY = localStorage.getItem('teaven_api_key') || '';
const IS_IMPERSONATED = API_KEY.startsWith('imp_');
let currentPage = 'dashboard';

// Init theme
(function initTheme() {
  const saved = localStorage.getItem('teaven_theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
  else document.documentElement.setAttribute('data-theme', 'light');
  updateThemeIcon();
})();

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('teaven_theme', next);
  updateThemeIcon();
}

function updateThemeIcon() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('themeIconLight').style.display = isDark ? 'none' : '';
  document.getElementById('themeIconDark').style.display = isDark ? '' : 'none';
}

// Sidebar
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const main = document.getElementById('mainWrap');
  sb.classList.toggle('collapsed');
  main.classList.toggle('expanded');
  localStorage.setItem('teaven_sidebar_collapsed', sb.classList.contains('collapsed') ? '1' : '0');
}

function toggleMobileSidebar() {
  const sb = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sb.classList.toggle('mobile-open');
  overlay.classList.toggle('active');
}

function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}

// Init sidebar state
if (localStorage.getItem('teaven_sidebar_collapsed') === '1') {
  document.getElementById('sidebar').classList.add('collapsed');
  document.getElementById('mainWrap').classList.add('expanded');
}

// Navigation
function navigateTo(page, el) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('breadcrumbPage').textContent = getPageName(page);
  closeMobileSidebar();
  renderPage(page);
}

function getPageName(page) {
  const map = {dashboard:'仪表盘',users:'用户管理',providers:'发送通道',accounts:'发件账号',routes:'分类路由',logs:'发送日志',analytics:'数据分析',settings:'系统设置'};
  return map[page] || page;
}

function refreshCurrentPage() { renderPage(currentPage); }

/* ==================== API ==================== */
async function api(path, opts = {}) {
  try {
    const res = await fetch(API_BASE + path, {
      headers: {'Authorization': 'Bearer ' + API_KEY, 'Content-Type': 'application/json', ...opts.headers},
      ...opts
    });
    return res.json();
  } catch (e) {
    return { success: false, error: '网络请求失败' };
  }
}

/* ==================== Toast ==================== */
function toast(msg, type = 'success') {
  const c = document.getElementById('toastContainer');
  const icons = {
    success:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    error:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    warning:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    info:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
  };
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.innerHTML = (icons[type] || icons.info) + msg;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(100%)'; el.style.transition = 'all .3s'; setTimeout(() => el.remove(), 300); }, 3500);
}

/* ==================== Utility ==================== */
function esc(s) {
  if (!s && s !== 0) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function formatDateShort(d) {
  if (!d) return '-';
  const dt = new Date(d);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}

function showModal(title, bodyHTML, footerHTML, size = '') {

    '<div class="modal' + (size ? ' modal-lg' : '') + '">' +
    '<div class="modal-header"><div class="modal-title">' + esc(title) + '</div>' +
    '<button class="modal-close" onclick="closeModal()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>' +
    '<div class="modal-body">' + bodyHTML + '</div>' +
    (footerHTML ? '<div class="modal-footer">' + footerHTML + '</div>' : '') +
    '</div></div>';
  container.innerHTML = html;
}

function sortUsers(field) {
  if (userSort === field) userSortDir = userSortDir === 'asc' ? 'desc' : 'asc';
  else { userSort = field; userSortDir = 'desc'; }
  filterUsers();
}

function filterUsers() {
  const searchEl = document.getElementById('userSearchInput');
  const filterEl = document.getElementById('userFilterSelect');
  if (searchEl) userSearch = searchEl.value.toLowerCase();
  if (filterEl) userFilter = filterEl.value;

  let filtered = [...userData];
  if (userSearch) filtered = filtered.filter(u => u.name.toLowerCase().includes(userSearch) || u.email.toLowerCase().includes(userSearch));
  if (userFilter !== 'all') filtered = filtered.filter(u => u.status === userFilter);

  // Sort
  filtered.sort((a,b) => {
    let va = a[userSort], vb = b[userSort];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return userSortDir === 'asc' ? -1 : 1;
    if (va > vb) return userSortDir === 'asc' ? 1 : -1;
    return 0;
  });

  // Paginate
  const perPage = 10;
  const totalPages = Math.ceil(filtered.length / perPage) || 1;
  if (userPage > totalPages) userPage = totalPages;
  const start = (userPage - 1) * perPage;
  const pageData = filtered.slice(start, start + perPage);

  const tbody = document.getElementById('userTableBody');
  if (tbody) {
    tbody.innerHTML = pageData.map(u => `
      <tr>
        <td style="font-weight:600;color:var(--text-primary)">${esc(u.name)}</td>
        <td>${esc(u.email)}</td>
        <td><span class="badge ${u.status==='active'?'badge-success':'badge-danger'}">${u.status==='active'?'活跃':'已停用'}</span></td>
        <td>${u.is_super_admin? '<span class="badge badge-primary">超级管理员</span>' : '<span class="badge badge-muted">普通用户</span>'}</td>
        <td>${u.api_key_count}</td>
        <td>${(u.mail_count||0).toLocaleString()}</td>
        <td>${formatDate(u.created_at)}</td>
        <td style="text-align:right">
          <div class="btn-group" style="justify-content:flex-end">
            <button class="btn btn-sm btn-ghost" onclick="impersonateUser('${esc(u.id)}')" title="模拟登录">模拟</button>
            <button class="btn btn-sm btn-ghost" onclick="toggleUserStatus('${esc(u.id)}','${esc(u.status)}')">${u.status==='active'?'停用':'启用'}</button>
            <button class="btn btn-sm btn-danger" onclick="deleteUser('${esc(u.id)}')">删除</button>
          </div>
        </td>
      </tr>
    `).join('');

    // Pagination
    const pag = document.getElementById('userPagination');
    if (pag) {
      let html = `<span>显示 ${start+1}-${Math.min(start+perPage,filtered.length)} / 共 ${filtered.length} 条</span>`;
      html += '<div class="pagination-pages">';
      html += `<button class="pagination-btn" onclick="userPage=1;filterUsers()" ${userPage===1?'disabled':''}>«</button>`;
      html += `<button class="pagination-btn" onclick="if(userPage>1){userPage--;filterUsers()}" ${userPage===1?'disabled':''}>‹</button>`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="pagination-btn ${i===userPage?'active':''}" onclick="userPage=${i};filterUsers()">${i}</button>`;
      }
      html += `<button class="pagination-btn" onclick="if(userPage<${totalPages}){userPage++;filterUsers()}" ${userPage===totalPages?'disabled':''}>›</button>`;
      html += `<button class="pagination-btn" onclick="userPage=${totalPages};filterUsers()" ${userPage===totalPages?'disabled':''}>»</button>`;
      html += '</div>';
      pag.innerHTML = html;
    }
  }
}

async function toggleUserStatus(id, status) {
  const newStatus = status === 'active' ? 'suspended' : 'active';
  if (API_KEY) {
    await api('/admin/tenants/' + id, {method:'PUT',body:JSON.stringify({status:newStatus})});
  } else {
    const u = userData.find(u => u.id === id);
    if (u) u.status = newStatus;
  }
  filterUsers();
  toast('用户状态已更新');
}

async function deleteUser(id) {
  if (!confirm('确定删除此用户？此操作不可撤销。')) return;
  if (API_KEY) {
    await api('/admin/tenants/' + id, {method:'PUT',body:JSON.stringify({status:'deleted'})});
  } else {
    userData = userData.filter(u => u.id !== id);
  }
  filterUsers();
  toast('用户已删除');
}

  }
}

function getProviderConfig(p) {
  const config = typeof p.config === 'string' ? JSON.parse(p.config) : p.config;
  if (p.type === 'smtp') return 'SMTP: ' + (config.host || '') + ':' + (config.port || '');
  if (p.type === 'api') return 'API: ' + (config.provider_name || 'Generic');
  return 'Domain: ' + (config.domain || '');
}

function showProviderModal(id) {
  const isEdit = !!id;
  const p = isEdit ? providerData.find(x => x.id === id) : null;
  const config = p ? (typeof p.config === 'string' ? JSON.parse(p.config) : p.config) : {};

  showModal(isEdit ? '编辑通道' : '新增通道', `
    <div class="form-group">
      <label class="form-label">通道名称 <span class="required">*</span></label>
      <input class="form-input" id="provName" value="${esc(p?.name||'')}" placeholder="如：阿里企业邮">
    </div>
    <div class="form-group">
      <label class="form-label">通道类型 <span class="required">*</span></label>
      <select class="form-select" id="provType">
        <option value="smtp" ${p?.type==='smtp'?'selected':''}>SMTP</option>
        <option value="api" ${p?.type==='api'?'selected':''}>API</option>
        <option value="cloudflare_email" ${p?.type==='cloudflare_email'?'selected':''}>Cloudflare Email</option>
      </select>
    </div>
    <div id="provConfigFields"></div>
    <div class="form-group">
      <label class="form-label">优先级</label>
      <input class="form-input" id="provPriority" type="number" value="${p?.priority||0}" placeholder="数字越大优先级越高">

  `, `
    <button class="btn btn-ghost" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" id="saveProvBtn">${isEdit?'更新':'创建'}</button>
  `, 'lg');

  function updateConfigFields() {
    const type = document.getElementById('provType').value;
    let html = '';
    if (type === 'smtp') {
      html = `
        <div class="form-row">
          <div class="form-group"><label class="form-label">SMTP 主机</label><input class="form-input" id="provHost" value="${esc(config.host||'')}" placeholder="smtp.example.com"></div>
          <div class="form-group"><label class="form-label">端口</label><input class="form-input" id="provPort" type="number" value="${config.port||465}" placeholder="465"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">用户名</label><input class="form-input" id="provUser" value="${esc(config.username||'')}"></div>
          <div class="form-group"><label class="form-label">密码</label><input class="form-input" id="provPass" type="password" value="${esc(config.password||'')}"></div>
        </div>`;
    } else if (type === 'api') {
      html = `
        <div class="form-group"><label class="form-label">API 供应商</label><input class="form-input" id="provApiName" value="${esc(config.provider_name||'')}" placeholder="SendGrid / Mailgun"></div>
        <div class="form-group"><label class="form-label">API Key</label><input class="form-input" id="provApiKey" type="password" value="${esc(config.api_key||'')}"></div>`;
    } else {
      html = `<div class="form-group"><label class="form-label">域名</label><input class="form-input" id="provDomain" value="${esc(config.domain||'')}" placeholder="mail.example.com"></div>`;
    }
    document.getElementById('provConfigFields').innerHTML = html;
  }
  updateConfigFields();
  document.getElementById('provType').addEventListener('change', updateConfigFields);

  document.getElementById('saveProvBtn').addEventListener('click', async () => {
    const name = document.getElementById('provName').value.trim();
    const type = document.getElementById('provType').value;
    const priority = parseInt(document.getElementById('provPriority').value) || 0;
    if (!name) { toast('请输入通道名称', 'error'); return; }

    let config = {};
    if (type === 'smtp') {
      config = {host:document.getElementById('provHost')?.value||'',port:parseInt(document.getElementById('provPort')?.value)||465,username:document.getElementById('provUser')?.value||'',password:document.getElementById('provPass')?.value||''};
    } else if (type === 'api') {
      config = {provider_name:document.getElementById('provApiName')?.value||'',api_key:document.getElementById('provApiKey')?.value||''};
    } else {
      config = {domain:document.getElementById('provDomain')?.value||''};
    }

    if (isEdit && API_KEY) {
      await api('/admin/providers/' + id, {method:'PUT',body:JSON.stringify({name,type,config,priority})});
    } else if (API_KEY) {
      await api('/admin/providers', {method:'POST',body:JSON.stringify({name,type,config,priority})});
    }
    closeModal();
    toast(isEdit ? '通道已更新' : '通道已创建');
    renderPage('providers');
  });
}

/* ==================== Init ==================== */
// Impersonation detection
if (IS_IMPERSONATED) {
  document.getElementById('impBanner').classList.remove('hidden');
}

function exitImpersonation() {
  const adminKey = localStorage.getItem('teaven_super_admin_key_backup');
  if (adminKey) {
    localStorage.setItem('teaven_admin_key', adminKey);
    localStorage.removeItem('teaven_super_admin_key_backup');
  }
  localStorage.removeItem('teaven_api_key');
  location.reload();
}

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.querySelector('.search-input')?.focus();
  }
});

// Start
renderPage('dashboard');
